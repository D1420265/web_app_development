{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-5">
    <h2 class="fw-bold m-0"><i class="bi bi-bookmark-heart text-primary me-2"></i>我的收藏</h2>
</div>

{% if not recipes %}
<div class="text-center py-5">
    <div class="mb-4 text-muted">
        <i class="bi bi-journal-x" style="font-size: 3rem;"></i>
    </div>
    <h4 class="text-secondary fw-semibold">尚無食譜</h4>
    <p class="text-muted">您還沒有建立任何食譜，立刻來新增第一份吧！</p>
    <a href="{{ url_for('recipe.add') }}" class="btn btn-primary mt-3 px-4 rounded-pill">
        <i class="bi bi-plus-lg me-1"></i> 新增食譜
    </a>
</div>
{% else %}
<div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
    {% for r in recipes %}
    <div class="col">
        <div class="card h-100 glass-card border-0 text-decoration-none">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between align-items-start mb-2">
                    <h5 class="card-title fw-bold text-dark text-truncate mb-0" style="max-width: 80%;">{{ r.title }}</h5>
                    {% if r.portions %}
                    <span class="badge bg-light text-secondary border rounded-pill px-2 py-1"><i class="bi bi-people me-1"></i>{{ r.portions }}</span>
                    {% endif %}
                </div>
                <p class="card-text text-muted small mt-3" style="display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; min-height: 4.5rem;">
                    {{ r.steps }}
                </p>
            </div>
            <div class="card-footer bg-transparent border-0 p-4 pt-0 text-end">
                <a href="{{ url_for('recipe.detail', id=r.id) }}" class="btn btn-outline-primary btn-sm rounded-pill px-3 fw-medium">
                    查看詳情 <i class="bi bi-arrow-right ms-1"></i>
                </a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endif %}
{% endblock %}
